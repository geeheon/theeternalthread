<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="nav-widget.css">
  <link rel="stylesheet" href="audio-widget.css">
  <script defer src="nav-widget.js"></script>
  <script defer src="audio-widget.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>The Eternal Thread</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f17;
      color: #e8e0d8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px 64px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 460px;
      width: 100%;
    }

    .site-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .site-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 28px;
      color: #e8e0d8;
      letter-spacing: 1px;
    }

    .site-header .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: #908880;
      margin-top: 6px;
    }

    .header-line {
      width: 50px;
      height: 1px;
      margin: 14px auto 0;
      background: linear-gradient(90deg, transparent, #706860, transparent);
    }

    /* Section dividers */
    .section-divider {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #504840;
      margin: 28px 0 12px;
      padding-left: 2px;
    }

    /* Cards */
    .card {
      display: block;
      text-decoration: none;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    /* Theme colours */
    .card.gold    { background: rgba(230,192,104,0.04); border: 1px solid rgba(230,192,104,0.08); }
    .card.gold:hover { background: rgba(230,192,104,0.07); border-color: rgba(230,192,104,0.14); }
    .card.purple  { background: rgba(212,160,240,0.04); border: 1px solid rgba(212,160,240,0.08); }
    .card.purple:hover { background: rgba(212,160,240,0.07); border-color: rgba(212,160,240,0.14); }
    .card.green   { background: rgba(104,230,160,0.04); border: 1px solid rgba(104,230,160,0.08); }
    .card.green:hover { background: rgba(104,230,160,0.07); border-color: rgba(104,230,160,0.14); }
    .card.silver  { background: rgba(192,192,216,0.04); border: 1px solid rgba(192,192,216,0.08); }
    .card.silver:hover { background: rgba(192,192,216,0.07); border-color: rgba(192,192,216,0.14); }
    .card.blue    { background: rgba(104,160,230,0.04); border: 1px solid rgba(104,160,230,0.08); }
    .card.blue:hover { background: rgba(104,160,230,0.07); border-color: rgba(104,160,230,0.14); }
    .card.warm    { background: rgba(230,168,104,0.04); border: 1px solid rgba(230,168,104,0.08); }
    .card.warm:hover { background: rgba(230,168,104,0.07); border-color: rgba(230,168,104,0.14); }

    .card-number {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      color: #504840;
      margin-bottom: 4px;
    }

    .card-category {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card.gold .card-category    { color: #e6c068; }
    .card.purple .card-category  { color: #d4a0f0; }
    .card.green .card-category   { color: #68e6a0; }
    .card.silver .card-category  { color: #c0c0d8; }
    .card.blue .card-category    { color: #68a0e6; }
    .card.warm .card-category    { color: #e6a868; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 400;
      color: #e0d8d0;
      line-height: 1.3;
    }

    .card-verse {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #908880;
      margin-top: 2px;
    }

    .card-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      color: #807870;
      line-height: 1.5;
      margin-top: 6px;
      opacity: 0.6;
    }

    .card-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.2;
    }

    .card.gold .card-arrow    { color: #e6c068; }
    .card.purple .card-arrow  { color: #d4a0f0; }
    .card.green .card-arrow   { color: #68e6a0; }
    .card.silver .card-arrow  { color: #c0c0d8; }
    .card.blue .card-arrow    { color: #68a0e6; }
    .card.warm .card-arrow    { color: #e6a868; }

    .page-count {
      text-align: center;
      margin-top: 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: #504840;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .card-desc { font-size: 14px; opacity: 0.8; }
      .card-verse { color: #a09888; }
      .site-header .tagline { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="site-header">
      <h1>The Eternal Thread</h1>
      <p class="tagline">Tracing the structural logic of Scripture</p>
      <div class="header-line"></div>
    </div>

    <div id="cards"></div>

    <div class="page-count"></div>

  </div>

  <script>
    fetch('site-map.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var container = document.getElementById('cards');
        var pageNum = 0;

        data.sections.forEach(function (section) {
          var divider = document.createElement('span');
          divider.className = 'section-divider';
          divider.textContent = section.title;
          container.appendChild(divider);

          section.pages.forEach(function (page) {
            pageNum++;
            var numStr = pageNum < 10 ? '0' + pageNum : '' + pageNum;

            var a = document.createElement('a');
            a.href = page.file;
            a.className = 'card ' + page.theme;

            a.innerHTML =
              '<div class="card-number">' + numStr + '</div>' +
              '<div class="card-category">' + page.category + '</div>' +
              '<div class="card-title">' + page.title + '</div>' +
              '<div class="card-verse">' + page.verse + '</div>' +
              '<div class="card-desc">' + page.desc + '</div>' +
              '<span class="card-arrow">\u2192</span>';

            container.appendChild(a);
          });
        });

        var countEl = document.querySelector('.page-count');
        if (countEl) countEl.textContent = pageNum + ' figures';
      })
      .catch(function () {
        console.warn('[index] Could not load site-map.json');
      });
  </script>
</body>
</html>
